syntax = "proto3";

package edubase.course.v1;

option java_package = "com.edubase.contracts.course.v1";
option java_multiple_files = true;
option java_outer_classname = "CourseQueryProto";

service CourseQueryService {
  rpc GetCourseById (CourseByIdRequest) returns (CourseByIdResponse);
}

message CourseByIdRequest {
  string course_id = 1;
}

message CourseByIdResponse {
  string course_id = 1;
  bool exists = 2;
  bool published = 3;
  string instructor_id = 4;
  string title = 5;
}
