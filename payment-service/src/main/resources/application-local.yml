server:
  port: 8087

spring:
  datasource:
    url: jdbc:postgresql://localhost:5437/edubase_payment_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  kafka:
    bootstrap-servers: localhost:9092
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  issuer: edubase-auth
  audience: api-gateway

services:
  api-gateway:
    url: http://localhost:8090
  user-service:
    url: http://localhost:8081
  course-service:
    url: http://localhost:8083

grpc:
  server:
    port: 9095
  client:
    user:
      host: localhost
      port: 9091
    course:
      host: localhost
      port: 9093

management:
  endpoint:
    health:
      show-details: always
