server:
  port: ${PAYMENT_SERVICE_PORT:8087}

spring:
  application:
    name: payment-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET}
  issuer: ${JWT_ISSUER}
  audience: ${JWT_AUDIENCE}

app:
  gateway-url: ${services.api-gateway.url}
  kafka:
    topics:
      payment-succeeded: ${KAFKA_TOPIC_PAYMENT_SUCCEEDED:payment.succeeded.v1}
      payment-refunded: ${KAFKA_TOPIC_PAYMENT_REFUNDED:payment.refunded.v1}

payment:
  gateway:
    webhook-secret: ${PAYMENT_GATEWAY_WEBHOOK_SECRET:local-payment-webhook-secret-change-me}
    allowed-clock-skew-seconds: ${PAYMENT_GATEWAY_ALLOWED_CLOCK_SKEW_SECONDS:300}
    mock-confirm-enabled: ${PAYMENT_GATEWAY_MOCK_CONFIRM_ENABLED:false}

auth:
  debug: ${AUTH_DEBUG:false}

grpc:
  server:
    port: ${PAYMENT_GRPC_PORT:9095}
  client:
    user:
      host: ${USER_GRPC_HOST:localhost}
      port: ${USER_GRPC_PORT:9091}
    course:
      host: ${COURSE_GRPC_HOST:localhost}
      port: ${COURSE_GRPC_PORT:9093}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
