server:
  port: ${API_GATEWAY_PORT:8090}

jwt:
  secret: ${JWT_SECRET}
  issuer: ${JWT_ISSUER:edubase-auth}
  audience: ${JWT_AUDIENCE:api-gateway}

auth:
  debug: ${AUTH_DEBUG:false}

spring:
  application:
    name: api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: ${cors.allowed-origins}
            allowedMethods: ${cors.allowed-methods}
            allowedHeaders: ${cors.allowed-headers}
            allowCredentials: ${cors.allow-credentials}
      routes:
        - id: auth-service-route
          uri: ${service.auth.url}
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@rateLimitKeyResolver}"
                redis-rate-limiter.replenishRate: ${RATE_LIMIT_AUTH_REPLENISH:5}
                redis-rate-limiter.burstCapacity: ${RATE_LIMIT_AUTH_BURST:10}
                redis-rate-limiter.requestedTokens: 1

        - id: user-service-route
          uri: ${service.user.url}
          predicates:
            - Path=/api/v1/users/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@rateLimitKeyResolver}"
                redis-rate-limiter.replenishRate: ${RATE_LIMIT_USER_REPLENISH:20}
                redis-rate-limiter.burstCapacity: ${RATE_LIMIT_USER_BURST:40}
                redis-rate-limiter.requestedTokens: 1
        - id: course-service-route
          uri: ${service.course.url}
          predicates:
            - Path=/courses/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@rateLimitKeyResolver}"
                redis-rate-limiter.replenishRate: ${RATE_LIMIT_COURSE_REPLENISH:20}
                redis-rate-limiter.burstCapacity: ${RATE_LIMIT_COURSE_BURST:40}
                redis-rate-limiter.requestedTokens: 1
        - id: auth-service-docs
          uri: ${service.auth.url}
          predicates:
            - Path=/v3/api-docs/auth
          filters:
            - SetPath=/v3/api-docs
        - id: user-service-docs
          uri: ${service.user.url}
          predicates:
            - Path=/v3/api-docs/user
          filters:
            - SetPath=/v3/api-docs
        - id: course-service-docs
          uri: ${service.course.url}
          predicates:
            - Path=/v3/api-docs/course
          filters:
            - SetPath=/v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    disable-swagger-default-url: true
    path: /swagger-ui
    urls-primary-name: auth-service
    urls:
      - name: auth-service
        url: /v3/api-docs/auth
      - name: user-service
        url: /v3/api-docs/user
      - name: course-service
        url: /v3/api-docs/course
