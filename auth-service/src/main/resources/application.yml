spring:
  profiles:
    active: dev
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

jwt:
  expiration: 3h
  refreshTokenExpiration: 6h
  issuer: ${JWT_ISSUER:edubase-auth}
  audience: ${JWT_AUDIENCE:api-gateway}

app:
  gateway-url: ${GATEWAY_URL:http://localhost:8090}
  kafka:
    topics:
      user-registered: ${KAFKA_TOPIC_USER_REGISTERED:user.registered.v1}
  account-reactivation:
    token-expiration: 2h
    activation-base-url: http://localhost:8080/api/v1/auth/reactivate-account
