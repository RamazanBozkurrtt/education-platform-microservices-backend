spring:
  profiles:
    active: dev

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

jwt:
  expiration: 3h
  refreshTokenExpiration: 6h
  issuer: ${JWT_ISSUER:edubase-auth}
  audience: ${JWT_AUDIENCE:api-gateway}

app:
  gateway-url: ${GATEWAY_URL:http://localhost:8090}
  account-reactivation:
    token-expiration: 2h
    activation-base-url: http://localhost:8080/api/v1/auth/reactivate-account
