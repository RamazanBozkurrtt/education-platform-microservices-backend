server:
  port: 8081

spring:
  application:
    name: auth-service

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
