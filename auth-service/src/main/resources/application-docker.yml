spring:
  datasource:
    url: jdbc:postgresql://auth-postgres:5432/auth_db
    username: postgres
    password: postgres
  data:
    redis:
      host: redis
      port: 6379
  kafka:
    bootstrap-servers: kafka:29092

jwt:
  issuer: edubase-auth
  audience: api-gateway

services:
  api-gateway:
    url: http://api-gateway:8090

app:
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
