spring:
  datasource:
    url: ${AUTH_DB_URL}
    username: ${AUTH_DB_USERNAME}
    password: ${AUTH_DB_PASSWORD}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

jwt:
  issuer: ${JWT_ISSUER}
  audience: ${JWT_AUDIENCE}

services:
  api-gateway:
    url: ${API_GATEWAY_URL}

app:
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
