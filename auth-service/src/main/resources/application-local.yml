spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: postgres
    password: postgres
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092

jwt:
  issuer: edubase-auth
  audience: api-gateway

services:
  api-gateway:
    url: http://localhost:8090

app:
  frontend:
    base-url: http://localhost:5173
