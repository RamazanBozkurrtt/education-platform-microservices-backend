services:
  auth-postgres:
    image: postgres:15
    container_name: auth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  user-postgres:
    image: postgres:15
    container_name: user-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: edubase_user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edubase_user_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  enrollment-postgres:
    image: postgres:15
    container_name: enrollment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: edubase_enrollment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - enrollment_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edubase_enrollment_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  course-projection-postgres:
    image: postgres:15
    container_name: course-projection-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: edubase_course_projection_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - course_projection_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edubase_course_projection_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: edubase-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: edubase-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: edubase-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list > /tmp/kafka-topics-check || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: edubase-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  course-mongo:
    image: mongo:7
    container_name: course-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: edubase_course_db
    ports:
      - "27017:27017"
    volumes:
      - course_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: edubase-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-edubaseminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-edubase-miniopass}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: edubase-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-edubaseminio} ${MINIO_ROOT_PASSWORD:-edubase-miniopass} &&
      /usr/bin/mc mb --ignore-existing local/edubase-media
      "

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    restart: unless-stopped
    depends_on:
      auth-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      AUTH_DB_URL: jdbc:postgresql://auth-postgres:5432/auth_db
      AUTH_DB_USERNAME: postgres
      AUTH_DB_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_USER_REGISTERED: user.registered.v1
      GATEWAY_URL: http://api-gateway:8090
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    restart: unless-stopped
    depends_on:
      user-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: docker
      USER_DB_URL: jdbc:postgresql://user-postgres:5432/edubase_user_db
      USER_DB_USERNAME: postgres
      USER_DB_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-postgres:5432/edubase_user_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_GROUP_USER_SERVICE: user-service-group
      KAFKA_TOPIC_USER_REGISTERED: user.registered.v1
      KAFKA_TOPIC_INSTRUCTOR_LIFECYCLE: instructor.lifecycle.v1
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-local-internal-api-key}
      GATEWAY_URL: http://api-gateway:8090
      USER_GRPC_PORT: 9091
      USER_MEDIA_MINIO_ENDPOINT: http://minio:9000
      USER_MEDIA_MINIO_ACCESS_KEY: ${USER_MEDIA_MINIO_ACCESS_KEY:-${MINIO_ROOT_USER:-edubaseminio}}
      USER_MEDIA_MINIO_SECRET_KEY: ${USER_MEDIA_MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-edubase-miniopass}}
      USER_MEDIA_MINIO_BUCKET: edubase-media
      USER_MEDIA_MINIO_AUTO_CREATE_BUCKET: "true"
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8081:8081"
      - "9091:9091"

  course-service:
    build:
      context: .
      dockerfile: course-service/Dockerfile
    container_name: course-service
    restart: unless-stopped
    depends_on:
      course-mongo:
        condition: service_healthy
      course-projection-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      user-service:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MONGODB_URI: mongodb://course-mongo:27017/edubase_course_db
      COURSE_PROJECTION_DB_URL: jdbc:postgresql://course-projection-postgres:5432/edubase_course_projection_db
      COURSE_PROJECTION_DB_USERNAME: postgres
      COURSE_PROJECTION_DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_TYPE: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_GROUP_COURSE_SERVICE: course-service-group
      KAFKA_TOPIC_INSTRUCTOR_LIFECYCLE: instructor.lifecycle.v1
      KAFKA_TOPIC_COURSE_SEARCH_SYNC: course.search.sync.v1
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-local-internal-api-key}
      USER_SERVICE_INTERNAL_BASE_URL: http://user-service:8081
      GATEWAY_URL: http://api-gateway:8090
      USER_GRPC_HOST: user-service
      USER_GRPC_PORT: 9091
      COURSE_GRPC_PORT: 9092
      COURSE_MEDIA_MINIO_ENDPOINT: http://minio:9000
      COURSE_MEDIA_MINIO_ACCESS_KEY: ${COURSE_MEDIA_MINIO_ACCESS_KEY:-${MINIO_ROOT_USER:-edubaseminio}}
      COURSE_MEDIA_MINIO_SECRET_KEY: ${COURSE_MEDIA_MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-edubase-miniopass}}
      COURSE_MEDIA_MINIO_BUCKET: edubase-media
      COURSE_MEDIA_MINIO_AUTO_CREATE_BUCKET: "true"
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8083:8083"
      - "9093:9092"

  enrollment-service:
    build:
      context: .
      dockerfile: enrollment-service/Dockerfile
    container_name: enrollment-service
    restart: unless-stopped
    depends_on:
      enrollment-postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      user-service:
        condition: service_started
      course-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      ENROLLMENT_DB_URL: jdbc:postgresql://enrollment-postgres:5432/edubase_enrollment_db
      ENROLLMENT_DB_USERNAME: postgres
      ENROLLMENT_DB_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://enrollment-postgres:5432/edubase_enrollment_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_ENROLLMENT_CREATED: enrollment.created.v1
      KAFKA_TOPIC_ENROLLMENT_CANCELLED: enrollment.cancelled.v1
      GATEWAY_URL: http://api-gateway:8090
      USER_GRPC_HOST: user-service
      USER_GRPC_PORT: 9091
      COURSE_GRPC_HOST: course-service
      COURSE_GRPC_PORT: 9092
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8084:8084"

  search-service:
    build:
      context: .
      dockerfile: search-service/Dockerfile
    container_name: search-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_GROUP_SEARCH_SERVICE: search-service-group
      KAFKA_TOPIC_COURSE_SEARCH_SYNC: course.search.sync.v1
      KAFKA_TOPIC_COURSE_RATING_UPDATED: course.rating.updated.v1
      ELASTICSEARCH_URIS: http://elasticsearch:9200
      SEARCH_GRPC_PORT: 9094
    ports:
      - "8085:8085"
      - "9094:9094"

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      course-service:
        condition: service_started
      enrollment-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_SERVICE_URL: http://auth-service:8080
      USER_SERVICE_URL: http://user-service:8081
      COURSE_SERVICE_URL: http://course-service:8083
      ENROLLMENT_SERVICE_URL: http://enrollment-service:8084
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
    ports:
      - "8090:8090"

volumes:
  auth_postgres_data:
  user_postgres_data:
  enrollment_postgres_data:
  course_projection_postgres_data:
  course_mongo_data:
  elasticsearch_data:
  minio_data:

