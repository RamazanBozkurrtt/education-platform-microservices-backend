spring:
  config:
    activate:
      on-profile: prod
  cache:
    type: ${CACHE_TYPE:redis}
  data:
    mongodb:
      uri: ${MONGODB_URI}
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

auth:
  debug: ${AUTH_DEBUG:false}

app:
  gateway-url: ${GATEWAY_URL}

management:
  endpoints:
    web:
      exposure:
        include: health,info
