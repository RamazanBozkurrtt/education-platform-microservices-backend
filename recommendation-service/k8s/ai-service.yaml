apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: edubase
  labels:
    app: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: edubase/recommendation-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: APP_NAME
              value: "EduBase Recommendation Service"
            - name: APP_VERSION
              value: "1.0.0"
            - name: LOG_LEVEL
              value: "INFO"
            - name: API_PREFIX
              value: "/api/v1"
            - name: CORS_ALLOW_ORIGINS
              value: "*"
            - name: COURSE_SERVICE_URL
              value: "http://course-service:8083"
            - name: USER_SERVICE_URL
              value: "http://user-service:8081"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: edubase
  labels:
    app: ai-service
spec:
  type: ClusterIP
  selector:
    app: ai-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000