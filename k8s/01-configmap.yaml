apiVersion: v1
kind: ConfigMap
metadata:
  name: edubase-config
  namespace: edubase
data:
  JWT_ISSUER: edubase-auth
  JWT_AUDIENCE: api-gateway
  SPRING_PROFILES_ACTIVE: k8s
  FRONTEND_BASE_URL: http://localhost:30080
  CORS_ALLOWED_ORIGINS: http://localhost:30080,http://127.0.0.1:30080,http://localhost:30090,http://127.0.0.1:30090,http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000

  API_BASE_URL: http://localhost:30090
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  MONGODB_URI: mongodb://mongo:27017/edubase_course_db
  ELASTICSEARCH_URIS: http://elasticsearch:9200
  CACHE_TYPE: redis

  API_GATEWAY_URL: http://api-gateway:8090
  AUTH_SERVICE_URL: http://auth-service:8080
  USER_SERVICE_URL: http://user-service:8081
  COURSE_SERVICE_URL: http://course-service:8083
  ENROLLMENT_SERVICE_URL: http://enrollment-service:8084
  PAYMENT_SERVICE_URL: http://payment-service:8087
  REVIEW_SERVICE_URL: http://review-service:8086

  AUTH_DB_HOST: postgres
  AUTH_DB_PORT: "5432"
  AUTH_DB_NAME: auth_db
  AUTH_DB_USERNAME: postgres

  USER_DB_HOST: postgres
  USER_DB_PORT: "5432"
  USER_DB_NAME: edubase_user_db
  USER_DB_USERNAME: postgres

  COURSE_DB_HOST: postgres
  COURSE_DB_PORT: "5432"
  COURSE_DB_NAME: edubase_course_projection_db
  COURSE_DB_USERNAME: postgres

  ENROLLMENT_DB_HOST: postgres
  ENROLLMENT_DB_PORT: "5432"
  ENROLLMENT_DB_NAME: edubase_enrollment_db
  ENROLLMENT_DB_USERNAME: postgres

  PAYMENT_DB_HOST: postgres
  PAYMENT_DB_PORT: "5432"
  PAYMENT_DB_NAME: edubase_payment_db
  PAYMENT_DB_USERNAME: postgres

  REVIEW_DB_HOST: postgres
  REVIEW_DB_PORT: "5432"
  REVIEW_DB_NAME: edubase_review_db
  REVIEW_DB_USERNAME: postgres

  USER_GRPC_HOST: user-service
  USER_GRPC_PORT: "9091"
  COURSE_GRPC_HOST: course-service
  COURSE_GRPC_PORT: "9093"
  PAYMENT_GRPC_HOST: payment-service
  PAYMENT_GRPC_PORT: "9095"

  USER_MEDIA_MINIO_ENDPOINT: http://minio:9000
  COURSE_MEDIA_MINIO_ENDPOINT: http://minio:9000
  USER_MEDIA_MINIO_BUCKET: edubase-media
  COURSE_MEDIA_MINIO_BUCKET: edubase-media
  USER_MEDIA_MINIO_AUTO_CREATE_BUCKET: "true"
  COURSE_MEDIA_MINIO_AUTO_CREATE_BUCKET: "true"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: edubase
data:
  init-multiple-dbs.sql: |
    CREATE DATABASE auth_db;
    CREATE DATABASE edubase_user_db;
    CREATE DATABASE edubase_course_projection_db;
    CREATE DATABASE edubase_enrollment_db;
    CREATE DATABASE edubase_payment_db;
    CREATE DATABASE edubase_review_db;
