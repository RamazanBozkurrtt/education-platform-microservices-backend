server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://user-postgres:5432/edubase_user_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: redis
      port: 6379
  kafka:
    bootstrap-servers: kafka:29092
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  issuer: edubase-auth
  audience: api-gateway

services:
  api-gateway:
    url: http://api-gateway:8090
  auth-service:
    url: http://auth-service:8080

user:
  media:
    minio:
      endpoint: http://minio:9000
      access-key: ${USER_MEDIA_MINIO_ACCESS_KEY}
      secret-key: ${USER_MEDIA_MINIO_SECRET_KEY}
      bucket: ${USER_MEDIA_MINIO_BUCKET:edubase-media}
      auto-create-bucket: ${USER_MEDIA_MINIO_AUTO_CREATE_BUCKET:true}

grpc:
  server:
    port: 9091
