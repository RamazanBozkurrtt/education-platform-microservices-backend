server:
  port: ${USER_SERVICE_PORT:8081}

spring:
  application:
    name: user-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: never
