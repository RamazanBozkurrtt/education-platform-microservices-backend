server:
  port: ${USER_SERVICE_PORT:8081}

spring:
  application:
    name: user-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
    group:
      dev: local

  cache:
    type: redis

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: ${KAFKA_GROUP_USER_SERVICE:user-service-group}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.edubase.commonCore.events
        spring.json.value.default.type: com.edubase.commonCore.events.UserRegisteredEvent
        spring.json.use.type.headers: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET}
  issuer: ${JWT_ISSUER}
  audience: ${JWT_AUDIENCE}

app:
  gateway-url: ${services.api-gateway.url}
  kafka:
    topics:
      user-registered: ${KAFKA_TOPIC_USER_REGISTERED:user.registered.v1}
      instructor-lifecycle: ${KAFKA_TOPIC_INSTRUCTOR_LIFECYCLE:instructor.lifecycle.v1}
  internal:
    api-key: ${INTERNAL_API_KEY}
    auth-service-base-url: ${services.auth-service.url}

user:
  media:
    avatar-base-path: ${USER_AVATAR_BASE_PATH:images/avatars}
    minio:
      endpoint: ${USER_MEDIA_MINIO_ENDPOINT}
      access-key: ${USER_MEDIA_MINIO_ACCESS_KEY}
      secret-key: ${USER_MEDIA_MINIO_SECRET_KEY}
      bucket: ${USER_MEDIA_MINIO_BUCKET}
      auto-create-bucket: ${USER_MEDIA_MINIO_AUTO_CREATE_BUCKET}

auth:
  debug: ${AUTH_DEBUG:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: never

grpc:
  server:
    port: ${USER_GRPC_PORT:9091}
