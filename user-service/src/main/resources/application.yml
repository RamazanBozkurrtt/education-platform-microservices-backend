server:
  port: ${USER_SERVICE_PORT:8081}

spring:
  application:
    name: user-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  cache:
    type: redis

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_USER_SERVICE:user-service-group}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.edubase.commonCore.events
        spring.json.value.default.type: com.edubase.commonCore.events.UserRegisteredEvent
        spring.json.use.type.headers: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET}
  issuer: ${JWT_ISSUER:edubase-auth}
  audience: ${JWT_AUDIENCE:api-gateway}

app:
  gateway-url: ${GATEWAY_URL:http://localhost:8090}
  kafka:
    topics:
      user-registered: ${KAFKA_TOPIC_USER_REGISTERED:user.registered.v1}

auth:
  debug: ${AUTH_DEBUG:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: never

grpc:
  server:
    port: ${USER_GRPC_PORT:9091}
