server:
  port: 8085

spring:
  kafka:
    bootstrap-servers: kafka:29092
  elasticsearch:
    uris: http://elasticsearch:9200
    username: ${ELASTICSEARCH_USERNAME:}
    password: ${ELASTICSEARCH_PASSWORD:}

grpc:
  server:
    port: 9094

management:
  endpoints:
    web:
      exposure:
        include: health,info
