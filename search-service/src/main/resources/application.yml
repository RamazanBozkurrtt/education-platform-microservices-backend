server:
  port: ${SEARCH_SERVICE_PORT:8085}

spring:
  application:
    name: search-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
    group:
      dev: local
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: ${KAFKA_GROUP_SEARCH_SERVICE:search-service-group}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record
      concurrency: ${KAFKA_LISTENER_CONCURRENCY:3}
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS}

grpc:
  server:
    port: ${SEARCH_GRPC_PORT:9094}

app:
  kafka:
    topics:
      course-search-sync: ${KAFKA_TOPIC_COURSE_SEARCH_SYNC:course.search.sync.v1}
      course-rating-updated: ${KAFKA_TOPIC_COURSE_RATING_UPDATED:course.rating.updated.v1}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
