server:
  port: ${ENROLLMENT_SERVICE_PORT:8084}

spring:
  application:
    name: enrollment-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET}
  issuer: ${JWT_ISSUER}
  audience: ${JWT_AUDIENCE}

app:
  gateway-url: ${services.api-gateway.url}
  internal:
    api-key: ${INTERNAL_API_KEY}
  kafka:
    topics:
      enrollment-created: ${KAFKA_TOPIC_ENROLLMENT_CREATED:enrollment.created.v1}
      enrollment-cancelled: ${KAFKA_TOPIC_ENROLLMENT_CANCELLED:enrollment.cancelled.v1}

auth:
  debug: ${AUTH_DEBUG:false}

grpc:
  client:
    user:
      host: ${USER_GRPC_HOST:localhost}
      port: ${USER_GRPC_PORT:9091}
    course:
      host: ${COURSE_GRPC_HOST:localhost}
      port: ${COURSE_GRPC_PORT:9093}
    payment:
      host: ${PAYMENT_GRPC_HOST:localhost}
      port: ${PAYMENT_GRPC_PORT:9095}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
