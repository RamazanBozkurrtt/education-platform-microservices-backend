server:
  port: 8084

spring:
  datasource:
    url: jdbc:postgresql://${ENROLLMENT_DB_HOST:postgres}:${ENROLLMENT_DB_PORT:5432}/${ENROLLMENT_DB_NAME:edubase_enrollment_db}
    username: ${ENROLLMENT_DB_USERNAME:postgres}
    password: ${ENROLLMENT_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  issuer: ${JWT_ISSUER:edubase-auth}
  audience: ${JWT_AUDIENCE:api-gateway}

services:
  api-gateway:
    url: ${API_GATEWAY_URL:http://api-gateway:8090}
  user-service:
    url: ${USER_SERVICE_URL:http://user-service:8081}
  course-service:
    url: ${COURSE_SERVICE_URL:http://course-service:8083}

app:
  internal:
    api-key: ${INTERNAL_API_KEY}

grpc:
  client:
    user:
      host: ${USER_GRPC_HOST:user-service}
      port: ${USER_GRPC_PORT:9091}
    course:
      host: ${COURSE_GRPC_HOST:course-service}
      port: ${COURSE_GRPC_PORT:9093}
    payment:
      host: ${PAYMENT_GRPC_HOST:payment-service}
      port: ${PAYMENT_GRPC_PORT:9095}
