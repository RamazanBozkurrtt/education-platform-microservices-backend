server:
  port: ${REVIEW_SERVICE_PORT:8086}

spring:
  application:
    name: review-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET}
  issuer: ${JWT_ISSUER}
  audience: ${JWT_AUDIENCE}

app:
  gateway-url: ${services.api-gateway.url}
  internal:
    course-service-base-url: ${services.course-service.url}

auth:
  debug: ${AUTH_DEBUG:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
