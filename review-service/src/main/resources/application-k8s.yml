server:
  port: 8086

spring:
  datasource:
    url: jdbc:postgresql://${REVIEW_DB_HOST:postgres}:${REVIEW_DB_PORT:5432}/${REVIEW_DB_NAME:edubase_review_db}
    username: ${REVIEW_DB_USERNAME:postgres}
    password: ${REVIEW_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  issuer: ${JWT_ISSUER:edubase-auth}
  audience: ${JWT_AUDIENCE:api-gateway}

services:
  api-gateway:
    url: ${API_GATEWAY_URL:http://api-gateway:8090}
  course-service:
    url: ${COURSE_SERVICE_URL:http://course-service:8083}
