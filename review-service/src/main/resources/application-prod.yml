server:
  port: ${REVIEW_SERVICE_PORT}

spring:
  datasource:
    url: ${REVIEW_DB_URL}
    username: ${REVIEW_DB_USERNAME}
    password: ${REVIEW_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  issuer: ${JWT_ISSUER}
  audience: ${JWT_AUDIENCE}

services:
  api-gateway:
    url: ${API_GATEWAY_URL}
  course-service:
    url: ${COURSE_SERVICE_URL}

management:
  endpoint:
    health:
      show-details: never
